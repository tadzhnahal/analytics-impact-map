services:
  db:
    image: postgres:16
    container_name: analytics_map_db
    env_file:
      - .env
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    container_name: analytics_map_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: analytics_map_frontend
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      - backend
